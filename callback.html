<!DOCTYPE html>
  <html lang="en">
  <head>
  <meta charset="UTF-8">
  <title>auto_tiktok OAuth Callback</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; max-width: 720px; margin: 40px auto; padding: 0 20px; color: #222; }
    h1 { border-bottom: 2px solid #FE2C55; padding-bottom: 8px; }
    h2.ok { color: #0a7a28; }
    h2.err { color: #c00; }
    .box { background: #f7f7f7; border: 1px solid #ddd; padding: 16px 20px; margin: 16px 0; border-radius: 8px; }
    code { display: block; word-break: break-all; padding: 10px; background: #fff; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; font-family: Menlo, Consolas, monospace; margin-top: 6px; }
    button { margin-top: 10px; padding: 8px 16px; cursor: pointer; background: #FE2C55; color: #fff; border: none; border-radius: 4px; font-size: 14px; }
    button:hover { background: #e0224a; }
    .note { background: #fffdf0; border-left: 4px solid #f0c000; padding: 12px 16px; margin: 20px 0; font-size: 14px; }
  </style>
  </head>
  <body>
  <h1>auto_tiktok OAuth Callback</h1>
  <div id="content"></div>
  <script>
  (function () {
    var params = new URLSearchParams(window.location.search);
    var code = params.get('code');
    var state = params.get('state');
    var error = params.get('error');
    var errorDesc = params.get('error_description');
    var c = document.getElementById('content');

    function esc(s) {
      return String(s).replace(/[&<>"']/g, function (x) {
        return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[x];
      });
    }

    if (error) {
      c.innerHTML =
        '<h2 class="err">Authentication failed</h2>' +
        '<p><strong>Error:</strong> ' + esc(error) + '</p>' +
        (errorDesc ? '<p><strong>Description:</strong> ' + esc(errorDesc) + '</p>' : '');
      return;
    }

    if (!code) {
      c.innerHTML = '<h2 class="err">No authorization code in URL</h2><p>This page expects <code>?code=...</code> from TikTok.</p>';
      return;
    }

    c.innerHTML =
      '<h2 class="ok">Authentication successful</h2>' +
      '<div class="note">Copy the <strong>code</strong> below and paste it into the terminal where <code>tiktok_auth.py</code> is waiting. Verify the <strong>state</strong> matches the one printed by the script before pasting.</div>' +
      '<div class="box"><strong>code</strong><code id="code">' + esc(code) + '</code>' +
      '<button type="button" data-target="code">Copy code</button></div>' +
      '<div class="box"><strong>state</strong><code id="state">' + esc(state || '(none)') + '</code>' +
      '<button type="button" data-target="state">Copy state</button></div>';

    document.querySelectorAll('button[data-target]').forEach(function (b) {
      b.addEventListener('click', function () {
        var id = b.getAttribute('data-target');
        var txt = document.getElementById(id).textContent;
        if (navigator.clipboard) {
          navigator.clipboard.writeText(txt).then(function () {
            var orig = b.textContent;
            b.textContent = 'Copied';
            setTimeout(function () { b.textContent = orig; }, 1500);
          });
        }
      });
    });
  })();
  </script>
  </body>
  </html>
